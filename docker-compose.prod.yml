# =============================================================================
# Eloura AI — Production stack (single host)
# Builds the optimized server + client images and runs them behind nginx.
#
#   docker compose -f docker-compose.prod.yml up --build -d
#
# App is served on http://<host>/  (nginx on port 80, proxying /api → server).
# Provide all secrets via a .env file next to this compose file.
# =============================================================================

services:
  mongo:
    image: mongo:7
    container_name: eloura-mongo-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo-data:/data/db
    networks:
      - eloura-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile # the production multi-stage image
    container_name: eloura-server-prod
    restart: always
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    networks:
      - eloura-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile # the production nginx image
    container_name: eloura-client-prod
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - eloura-net

volumes:
  mongo-data:
    driver: local

networks:
  eloura-net:
    driver: bridge
